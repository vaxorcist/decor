# decor/test/fixtures/connection_groups.yml
# version 1.0
# Session 31: Part 1 — Connections feature foundation.
# Two groups covering two different owners:
#   bob_pdp8_vt100   — bob's VT100 terminal connected to his PDP-8 via RS-232.
#                      Has a connection_type set (rs232).
#   alice_pdp11_vax  — alice's PDP-11/70 connected to her VAX-11/780.
#                      No connection_type (nullable — left unspecified).
#
# Both groups have exactly 2 members (see connection_members.yml), making them
# useful for testing the minimum_two_members validation boundary and the
# auto-destroy-on-last-member cascade logic.

bob_pdp8_vt100:
  owner: two
  connection_type: rs232
  label: PDP-8 terminal connection

alice_pdp11_vax:
  owner: one
  label: Lab setup
