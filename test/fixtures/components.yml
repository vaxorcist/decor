# barter_status: 1 = offered — used for barter filter tests.
charlie_vt100_terminal:
  owner: three
  computer: dec_unibus_router
  component_type: memory_board
  description: VT100 terminal connected to charlie dec_unibus_router
  component_category: 1
  barter_status: 1
